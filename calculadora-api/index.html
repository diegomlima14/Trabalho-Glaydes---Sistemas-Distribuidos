<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora API</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Calculadora API</h1>

    <section class="card">
      <h2>Calcular</h2>
      <form id="calc-form" class="form">
        <label>
          Número 1
          <input id="numero1" type="number" step="any" required />
        </label>

        <label>
          Número 2
          <input id="numero2" type="number" step="any" required />
        </label>

        <label>
          Operação
          <select id="operacao">
            <option value="soma">Soma</option>
            <option value="subtracao">Subtração</option>
            <option value="multiplicacao">Multiplicação</option>
            <option value="divisao">Divisão</option>
          </select>
        </label>

        <button type="submit">Executar</button>
      </form>

      <div id="resultado" class="output"></div>
    </section>

    <section class="card">
      <h2>Histórico</h2>
      <button id="load-history">Carregar histórico</button>
      <ul id="history-list" class="history"></ul>
    </section>

    <section class="card">
      <h2>Informação da API</h2>
      <button id="load-welcome">Buscar boas-vindas</button>
      <div id="welcome" class="output"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
